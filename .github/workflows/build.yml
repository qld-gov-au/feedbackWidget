name: Build and distribute

# Runs when src/ or build config changes on any tracked environment branch.
# Builds the feedback widget, runs smoke tests, then pushes the output to
# the corresponding release branch (contains only the built output).
#
# Environment branches:
#   development  → PR  → dev build  → release-dev
#   uat          → PR  → uat build  → release-uat
#   main         → PR  → prod build → release-production
#
# ── Team configuration ─────────────────────────────────────────────────────────
# DIST_SOURCE  The folder whose contents are pushed to the release branch
# ───────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - refractor/changes-to-testing-docs-recaptcha-visiblefields-a11y
      - feature-test
      - development
    paths:
      - 'src/**'
      - 'tests/**'
      - 'build.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - uat
      - main
    paths:
      - 'src/**'
      - 'build.mjs'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DIST_SOURCE: dist
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PLAYWRIGHT_HEADLESS: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for worktree to access remote branches

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Resolve environment config
        id: config
        run: |
          # On pull_request events use the target branch; on push use the source branch
          REF="${{ github.base_ref || github.ref_name }}"
          case "$REF" in
            main) echo "build_env=prod"  >> "$GITHUB_OUTPUT"
              echo "release_branch=release-production" >> "$GITHUB_OUTPUT" ;;
            uat)  echo "build_env=uat"   >> "$GITHUB_OUTPUT"
              echo "release_branch=release-uat" >> "$GITHUB_OUTPUT" ;;
            *)    echo "build_env=dev"   >> "$GITHUB_OUTPUT"
              echo "release_branch=release-dev" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Install dependencies
        run: npm install

      - name: Create .env from secrets
        env:
          FSH_PROJECT: ${{ vars.FSH_PROJECT }}
          FSH_ENDPOINT_DEV: ${{ vars.FSH_ENDPOINT_DEV }}
          FSH_ENDPOINT_UAT: ${{ vars.FSH_ENDPOINT_UAT }}
          FSH_ENDPOINT_PROD: ${{ vars.FSH_ENDPOINT_PROD }}
          SMOKE_FSH_ENDPOINT: ${{ vars.SMOKE_FSH_ENDPOINT }}
        run: |
          if [[ -z "$FSH_PROJECT" ]]; then
            echo "Error: repository variable FSH_PROJECT must be set."
            exit 1
          fi

          if [[ -z "$FSH_ENDPOINT_DEV" || -z "$FSH_ENDPOINT_UAT" || -z "$FSH_ENDPOINT_PROD" ]]; then
            echo "Error: repository variables FSH_ENDPOINT_DEV, FSH_ENDPOINT_UAT, and FSH_ENDPOINT_PROD must be set."
            exit 1
          fi

          if [[ -z "$SMOKE_FSH_ENDPOINT" ]]; then
            echo "Error: repository variable SMOKE_FSH_ENDPOINT must be set to prevent smoke tests targeting a real endpoint."
            exit 1
          fi

          echo "RECAPTCHA_DEV=${{ secrets.RECAPTCHA_DEV }}" > .env
          echo "RECAPTCHA_PROD=${{ secrets.RECAPTCHA_PROD }}" >> .env
          echo "FSH_PROJECT=${FSH_PROJECT}" >> .env
          echo "FSH_ENDPOINT_DEV=${FSH_ENDPOINT_DEV}" >> .env
          echo "FSH_ENDPOINT_UAT=${FSH_ENDPOINT_UAT}" >> .env
          echo "FSH_ENDPOINT_PROD=${FSH_ENDPOINT_PROD}" >> .env
          echo "SMOKE_FSH_ENDPOINT=${SMOKE_FSH_ENDPOINT}" >> .env

      - name: Build
        run: npm run build:${{ steps.config.outputs.build_env }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Show smoke mode
        run: |
          echo "PLAYWRIGHT_HEADLESS=${PLAYWRIGHT_HEADLESS}"

      - name: Run smoke tests
        env:
          PLAYWRIGHT_HEADLESS: ${{ env.PLAYWRIGHT_HEADLESS }}
        run: npm run test:ci

      - name: Run accessibility tests
        env:
          PLAYWRIGHT_HEADLESS: ${{ env.PLAYWRIGHT_HEADLESS }}
        run: npm run test:a11y:ci

      - name: Push dist to ${{ steps.config.outputs.release_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RELEASE_BRANCH="${{ steps.config.outputs.release_branch }}"

          # Set up a worktree for the release branch.
          # Creates an orphan branch on first run; checks it out on subsequent runs.
          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$RELEASE_BRANCH"
            git worktree add /tmp/dist "$RELEASE_BRANCH"
          else
            git worktree add --orphan -b "$RELEASE_BRANCH" /tmp/dist
          fi

          # Replace the release branch contents with the current build output
          rm -rf /tmp/dist/*
          cp -r "${{ env.DIST_SOURCE }}/." /tmp/dist/

          cd /tmp/dist
          git add --all

          if git diff --cached --quiet; then
            echo "::notice::No changes to dist — skipping commit."
            exit 0
          fi

          git commit -m "dist(${{ github.ref_name }}): ${{ github.sha }}"
          git push origin "$RELEASE_BRANCH"
